<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prácticas de SQL</title>
 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- CSS personalizado -->
    <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
 
    <!-- Botón para abrir el menú en móviles -->
    <button class="btn btn-primary d-md-none m-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
        <i class="bi bi-list"></i> Menú
    </button>
 
    <div class="d-flex">
 
        <!-- ===================== CONTENIDO PRINCIPAL ===================== -->
        <main class="contenido flex-grow-1">
            <div class="container-fluid p-4">
                <h1 class="mb-4">7. Eliminar</h1>
 
                <!-- Contenedor donde se cargará el contenido de cada práctica -->
    <div class="practica-contenedor">
    
    <div class="practica-header pb-3 mb-4" style="border-bottom: 2px solid var(--color-borde);">
        <div class="d-flex align-items-center gap-2 mb-2">
            <span class="badge px-3 py-2 text-white" style="background-color: var(--color-activo); font-weight: 600; border-radius: 6px;">
                Tema 07
            </span>
            <small class="text-muted fw-semibold">Fundamentos</small>
        </div>
        <h2 class="fw-bold" style="color: var(--color-primario); letter-spacing: -0.5px;">Eliminar (Infografía de Esteban)</h2>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden mb-4" style="background-color: #f8fafc; border: 1px solid var(--color-borde) !important;">
        <div class="card-body p-4">
            <h4 class="fw-semibold mb-3" style="color: var(--color-secundario);">
                <i class="bi bi-book-half me-2" style="color: var(--color-hover);"></i>
            </h4>
            <p class="mb-4" style="line-height: 1.7; color: #334155;">
                <strong></strong>
            </p>
            
            <div class="text-center bg-white p-3 rounded-3 border shadow-sm mx-auto" style="max-width: 750px;">
                <img src="img/Eliminar.jpeg" alt="" class="img-fluid rounded-2">
            </div>
        </div>
    </div>

    <div class="p-4 rounded-3 d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3 mt-4 shadow-sm" 
         style="background-color: #ffffff; border: 1px solid var(--color-borde);">
        <div>
            <h6 class="fw-bold mb-1" style="color: var(--color-primario);">¿Terminaste de leer y practicar este módulo?</h6>
            <p class="text-muted small mb-0">Guarda tu avance para actualizar tu barra de progreso global.</p>
        </div>
        <button class="btn btn-completar text-white px-4 py-2.5 d-inline-flex align-items-center gap-2" 
                style="background-color: var(--color-activo); font-weight: 600; border: none; border-radius: 8px; transition: all 0.2s ease;"
                onclick="marcarPracticaCompletada('practica07')">
            <i class="bi bi-check-circle-fill fs-5"></i> Marcar como Completada
        </button>
    </div>

</div>

<style>
    .btn-completar:hover {
        background-color: var(--color-hover) !important;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
</style>
    </div>
 
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- JS personalizado -->
    <script src="js/script.js"></script>
 
</body>
</html>
